<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeadlockX — Deadlock Detection Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#050a0f; --panel:#0a1520; --panel2:#0d1e30; --border:#1a3550;
  --accent:#00e5ff; --accent2:#ff4d6d; --accent3:#39ff14; --warn:#ffb800;
  --text:#c8e0f0; --dim:#5a8aaa;
  --mono:'Share Tech Mono',monospace; --head:'Orbitron',sans-serif; --body:'Rajdhani',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:15px;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,229,255,0.03)1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03)1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:1500px;margin:0 auto;padding:18px;}

header{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:20px;}
.logo-title{font-family:var(--head);font-size:22px;font-weight:900;color:var(--accent);letter-spacing:3px;text-shadow:0 0 20px var(--accent),0 0 40px #00e5ff44;}
.logo-sub{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:2px;margin-top:2px;}
.status-pill{font-family:var(--mono);font-size:11px;padding:4px 12px;border-radius:2px;border:1px solid;display:flex;align-items:center;gap:6px;}
.status-pill.safe{border-color:var(--accent3);color:var(--accent3);}
.status-pill.danger{border-color:var(--accent2);color:var(--accent2);animation:blink 1s infinite;}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;}
@keyframes blink{50%{opacity:.4;}}

.mode-bar{display:flex;gap:0;border:1px solid var(--border);border-radius:3px;overflow:hidden;margin-bottom:20px;}
.mode-btn{flex:1;font-family:var(--mono);font-size:11px;letter-spacing:1px;padding:11px;background:transparent;border:none;color:var(--dim);cursor:pointer;transition:all .2s;text-align:center;}
.mode-btn.active{background:var(--accent);color:#000;font-weight:700;}
.mode-btn:not(.active):hover{background:#ffffff10;color:var(--text);}

.main-grid{display:grid;grid-template-columns:370px 1fr;gap:18px;}
@media(max-width:900px){.main-grid{grid-template-columns:1fr;}}

.panel{background:var(--panel);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:14px;}
.panel:last-child{margin-bottom:0;}
.panel-header{background:var(--panel2);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:1px;}
.panel-body{padding:14px;}

label{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:1px;display:block;margin-bottom:4px;margin-top:10px;}
label:first-child{margin-top:0;}
input[type=number]{width:100%;background:#071018;border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:13px;padding:7px 9px;border-radius:2px;outline:none;transition:border-color .2s;}
input[type=number]:focus{border-color:var(--accent);}

.btn{font-family:var(--head);font-size:11px;font-weight:700;letter-spacing:2px;padding:9px 16px;border:none;border-radius:2px;cursor:pointer;transition:all .2s;width:100%;}
.btn-primary{background:var(--accent);color:#000;box-shadow:0 0 16px #00e5ff44;margin-top:12px;}
.btn-primary:hover{background:#fff;}
.btn-secondary{background:transparent;color:var(--accent2);border:1px solid var(--accent2);margin-top:7px;}
.btn-secondary:hover{background:#ff4d6d15;}
.btn-warn{background:transparent;color:var(--warn);border:1px solid var(--warn);margin-top:7px;}
.btn-warn:hover{background:#ffb80015;}

.preset-row{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;}
.preset-btn{font-family:var(--mono);font-size:10px;padding:5px 9px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;border-radius:2px;transition:all .2s;letter-spacing:1px;}
.preset-btn:hover{border-color:var(--accent);color:var(--accent);}

.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:12px;}
.tab{font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:7px 13px;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

.mx-table{border-collapse:collapse;margin:0 auto;}
.mx-table th{font-family:var(--mono);font-size:10px;color:var(--dim);padding:8px 10px;border:1px solid var(--border);background:#071018;font-weight:400;letter-spacing:1px;}
.mx-table td{border:1px solid var(--border);padding:8;}
.mx-cell{width:38px;height:30px;background:transparent;border:none;text-align:center;font-family:var(--mono);font-size:12px;color:var(--text);cursor:pointer;transition:all .15s;display:block;width:100%;}
.mx-cell:hover{color:var(--accent);background:#00e5ff08;}
.mx-cell.ac{background:#00e5ff12;color:var(--accent);}
.mx-cell.rc{background:#ffb80012;color:var(--warn);}
.mx-cell.mc{background:#39ff1412;color:var(--accent3);}
.mx-cell:focus{outline:1px solid var(--accent);background:#00e5ff08;}
.mx-pl{font-family:var(--mono);font-size:10px;color:var(--accent);padding:8px 10px;text-align:right;white-space:nowrap;}

.avail-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.avail-item{display:flex;flex-direction:column;align-items:center;gap:3px;}
.avail-lbl{font-family:var(--mono);font-size:9px;color:var(--dim);}
.avail-inp{width:46px;text-align:center;font-family:var(--mono);font-size:13px;background:#071018;border:1px solid #39ff1455;color:var(--accent3);padding:6px 4px;border-radius:2px;outline:none;}
.avail-inp:focus{border-color:var(--accent3);}

#graph-container{position:relative;width:100%;height:490px;background:#030c14;border-radius:2px;overflow:hidden;}
#rag-canvas{width:100%;height:100%;display:block;cursor:default;}
#rag-canvas.dragging{cursor:grabbing;}
#rag-canvas.hovering{cursor:grab;}
.canvas-hint{position:absolute;bottom:10px;right:10px;font-family:var(--mono);font-size:10px;color:var(--dim);pointer-events:none;}
.drag-hint{position:absolute;top:10px;right:10px;font-family:var(--mono);font-size:10px;color:var(--dim);background:#0a1520cc;border:1px solid var(--border);padding:3px 9px;border-radius:2px;pointer-events:none;}
.mode-tag{position:absolute;top:10px;left:10px;font-family:var(--mono);font-size:10px;background:#0a1520cc;border:1px solid var(--border);padding:3px 9px;border-radius:2px;pointer-events:none;}
.mode-tag.banker{color:var(--accent3);border-color:var(--accent3);}
.mode-tag.rag{color:var(--accent);border-color:var(--accent);}

.result-title{font-family:var(--head);font-size:12px;letter-spacing:2px;margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid var(--border);}
.result-title.danger{color:var(--accent2);}
.result-title.safe{color:var(--accent3);}
.result-title.warn{color:var(--warn);}
.cycle-card{background:#ff4d6d10;border:1px solid #ff4d6d44;border-radius:2px;padding:10px 12px;margin-bottom:9px;}
.cycle-path{font-family:var(--mono);font-size:11px;color:var(--accent2);margin-bottom:7px;letter-spacing:1px;}
.res-list{list-style:none;}
.res-list li{font-size:13px;color:var(--text);padding:3px 0 3px 15px;position:relative;}
.res-list li::before{content:'▸';position:absolute;left:0;color:var(--warn);font-size:10px;top:5px;}
.safe-msg{background:#39ff1410;border:1px solid #39ff1444;border-radius:2px;padding:12px;font-family:var(--mono);font-size:13px;color:var(--accent3);display:flex;align-items:center;gap:10px;}
.danger-msg{background:#ff4d6d10;border:1px solid #ff4d6d44;border-radius:2px;padding:12px;display:flex;align-items:center;gap:10px;margin-bottom:12px;}

.safe-seq{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;align-items:center;}
.seq-node{font-family:var(--mono);font-size:12px;padding:4px 10px;background:#39ff1415;border:1px solid var(--accent3);border-radius:2px;color:var(--accent3);}
.seq-arrow{color:var(--dim);font-size:16px;}

.step-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;margin-top:8px;}
.step-table th{background:#071018;color:var(--dim);padding:5px 7px;border:1px solid var(--border);font-weight:400;letter-spacing:1px;}
.step-table td{padding:4px 7px;border:1px solid var(--border);text-align:center;font-family:var(--mono);font-size:11px;}
.step-table tr.finished td{background:#39ff1410;}
.step-table tr.blocked td{background:#ff4d6d10;}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.info-box{background:#071018;border:1px solid var(--border);border-radius:3px;padding:10px 12px;}
.info-box-lbl{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:1px;margin-bottom:5px;}
.info-box-val{font-family:var(--mono);font-size:13px;color:var(--accent);}

#algo-log{background:#030c14;border:1px solid var(--border);border-radius:2px;padding:9px 11px;margin-top:10px;font-family:var(--mono);font-size:11px;color:var(--dim);max-height:130px;overflow-y:auto;line-height:1.9;}
.log-step{color:var(--dim);} .log-ok{color:var(--accent3);} .log-info{color:var(--accent);} .log-err{color:var(--accent2);} .log-warn{color:var(--warn);}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#071018;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
